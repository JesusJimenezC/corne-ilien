# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# nice!view display with vendored nice_oled (nice_epaper) status screen
# (shield lives in boards/shields/nice_oled/ in this repo)
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Left (central) screen: layer, output, WPM graph, own battery
# (right-half battery is visible on the right screen itself).
# Modifier indicators disabled: their symbols render as clutter over the
# right edge of the WPM graph on the vertical nice!view layout.
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=n

# WPM as line graph + number, not bongo cat (the cat sprite renders sideways
# on the vertically-oriented nice!view canvas)
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=n
CONFIG_NICE_OLED_WIDGET_WPM_GRAPH=y
CONFIG_NICE_OLED_WIDGET_WPM_NUMBER=y

# Right (peripheral) screen: animation rotates on each power-on
# (gem -> head -> pokemon -> spaceman -> bongo cat), plus name
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_ROTATE=y
CONFIG_NICE_OLED_WIDGET_PERIPHERAL_NAME="ilien"

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# sleep settings
# currently set to 30 mins
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Note: the shield enables ZMK_DISPLAY_BLANK_ON_IDLE on nice!view, so screen
# animations freeze 30 s (default ZMK idle) after the last keypress — a
# deliberate battery saver. Raise CONFIG_ZMK_IDLE_TIMEOUT to change that.

CONFIG_ZMK_KEYBOARD_NAME="CorneKBH"
CONFIG_ZMK_STUDIO=y

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7
